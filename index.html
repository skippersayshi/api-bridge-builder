<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>API Bridge Builder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:#0a0a0f;color:#f5f5f7;min-height:100vh}
nav{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.08);padding:16px 32px;display:flex;align-items:center;gap:12px}
nav h1{font-size:18px;font-weight:600;letter-spacing:-.3px}
.badge{background:rgba(48,209,88,.2);color:#30d158;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
main{max-width:760px;margin:48px auto;padding:0 24px}
h2{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px}
p.sub{color:#8e8e93;margin-bottom:32px;font-size:15px}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:24px;margin-bottom:20px}
label{display:block;font-size:13px;font-weight:500;color:#8e8e93;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
textarea{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:#f5f5f7;padding:12px 14px;font-size:15px;font-family:inherit;outline:none;resize:vertical;min-height:120px;transition:border .2s}
textarea:focus{border-color:#30d158}
button{background:linear-gradient(135deg,#30d158,#34c759);color:#fff;border:none;border-radius:12px;padding:14px 28px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:20px;transition:opacity .2s}
button:hover{opacity:.85}button:disabled{opacity:.4;cursor:not-allowed}
.result{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:24px;margin-top:20px;display:none}
.result.show{display:block}
.status{font-size:22px;font-weight:700;margin-bottom:16px}
.status.ok{color:#30d158}.status.fail{color:#ff453a}
pre{background:rgba(0,0,0,.3);border-radius:10px;padding:16px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word;color:#e5e5ea}
.spinner{display:none;width:20px;height:20px;border:2px solid rgba(255,255,255,.2);border-top-color:#30d158;border-radius:50%;animation:spin .7s linear infinite;margin:8px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
</style></head><body>
<nav><div style="width:28px;height:28px;background:linear-gradient(135deg,#30d158,#34c759);border-radius:8px"></div><h1>API Bridge Builder</h1><span class="badge">Ralph Loop</span></nav>
<main>
<h2>Build API Bridge</h2>
<p class="sub">Describe the two systems you want to connect and the fields to map — get a structured bridge spec back.</p>
<div class="card">
  <label>Integration Description</label>
  <textarea id="desc" placeholder="e.g. Connect Salesforce CRM to SAP ERP via REST. Map customer_id, full_name, email, and invoice_total between the two systems..."></textarea>
  <button id="btn" onclick="run()">Build Bridge</button>
  <div class="spinner" id="spin"></div>
</div>
<div class="result" id="res">
  <div class="status" id="statusLine"></div>
  <label>Notes</label>
  <pre id="notes"></pre>
</div>
</main>
<script>
async function run(){
  const btn=document.getElementById('btn'),spin=document.getElementById('spin'),res=document.getElementById('res');
  btn.disabled=true;spin.style.display='block';res.classList.remove('show');
  try{
    const r=await fetch('/api/bridge',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      description:document.getElementById('desc').value||'Connect Salesforce to SAP ERP'
    })});
    const d=await r.json();
    if(d.error){alert(d.error);return}
    const s=document.getElementById('statusLine');
    s.textContent=d.success?'✓ Bridge Built Successfully':'✗ Build Failed';
    s.className='status '+(d.success?'ok':'fail');
    document.getElementById('notes').textContent=d.notes||'No additional notes.';
    res.classList.add('show');
  }catch(e){alert('Error: '+e.message)}
  finally{btn.disabled=false;spin.style.display='none'}
}
</script></body></html>
